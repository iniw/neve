name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  generate-check-matrix:
    name: Generate check matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes pipe-operators

      - name: Generate matrix
        id: matrix
        run: |
          matrix="$(nix eval --impure --json ".#checks" --apply '
            checks:
            let
              lib = (import <nixpkgs> { }).lib;

              checksFor =
                system: runner:
                checks
                |> lib.getAttr system
                |> lib.filterAttrs (_: check:
                  system == "x86_64-linux" || (check.multiPlatform or false)
                )
                |> lib.mapAttrsToList (check: derivation: {
                  inherit check system runner;
                  outputPath = toString derivation;
                });
            in
            {
              include =
                   checksFor "x86_64-linux" "ubuntu-latest"
                ++ checksFor "aarch64-darwin" "macos-latest"
                   ;
            }
          ')"

          cached_checks="$(mktemp)"
          while IFS=$'\t' read -r system check output_path; do
            if nix path-info --store https://neve.cachix.org "$output_path" > /dev/null 2>&1; then
              printf '%s\t%s\n' "$system" "$check" >> "$cached_checks"
            fi
          done < <(jq -r '.include[] | [.system, .check, .outputPath] | @tsv' <<< "$matrix")

          {
            echo "matrix<<EOF"
            jq --rawfile cachedChecks "$cached_checks" '
              ($cachedChecks | split("\n") | map(select(length > 0))) as $cachedChecks
              | .include |= map(
                . as $item
                | ($item | [.system, .check] | @tsv) as $check
                | $item + { cached: ($cachedChecks | index($check) != null) }
              )
              | del(.include[].outputPath)
            ' <<< "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  check:
    name: ${{ matrix.check }} [${{ matrix.system }}]
    needs: generate-check-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-check-matrix.outputs.matrix) }}
    uses: ./.github/workflows/nix-check.yaml
    with:
      check: ${{ matrix.check }}
      system: ${{ matrix.system }}
      runner: ${{ matrix.runner }}
      cached: ${{ matrix.cached }}
    secrets: inherit
