syntax = "proto3";

package neve.v1;

service AuthService {
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
}

message AuthenticateRequest {
  string username = 1;
}

message AuthenticateResponse {
  // The token that should be present in the HTTP headers of every request from the client past this point.
  string auth_token = 1;
}

service ChatService {
  rpc Chat(stream ChatRequest) returns (stream ChatResponse);
}

message ChatRequest {
  string message = 1;
}

message ChatResponse {
  string from = 1;
  string message = 2;
}
